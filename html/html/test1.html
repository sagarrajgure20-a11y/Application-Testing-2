<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Form</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background: linear-gradient(135deg,#dbeafe,#f0f9ff,#e0f2fe);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;
        }

        .container{
            width:100%;
            max-width:900px;
            background:white;
            border-radius:20px;
            padding:35px;
            box-shadow:0 10px 30px rgba(0,0,0,0.15);
        }

        h1{
            text-align:center;
            margin-bottom:30px;
            color:#0f172a;
        }

        .form-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:20px;
        }

        .full-width{
            grid-column:1 / -1;
        }

        .form-group{
            display:flex;
            flex-direction:column;
        }

        label{
            font-weight:bold;
            margin-bottom:8px;
            color:#334155;
        }

        input[type="text"],
        input[type="password"],
        select{
            padding:12px;
            border:1px solid #cbd5e1;
            border-radius:10px;
            outline:none;
            transition:0.3s;
            font-size:15px;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        select:focus{
            border-color:#3b82f6;
            box-shadow:0 0 8px rgba(59,130,246,0.3);
        }

        .option-group{
            display:flex;
            gap:15px;
            flex-wrap:wrap;
            background:#f8fafc;
            padding:12px;
            border-radius:10px;
        }

        .option-group label{
            font-weight:normal;
            margin:0;
            cursor:pointer;
        }

        button{
            width:100%;
            padding:14px;
            background:linear-gradient(to right,#2563eb,#06b6d4);
            color:white;
            border:none;
            border-radius:12px;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            transform:translateY(-2px);
            box-shadow:0 6px 15px rgba(37,99,235,0.3);
        }

        .link-section{
            text-align:center;
            margin-top:15px;
        }

        .link-section a{
            text-decoration:none;
            color:#2563eb;
            font-weight:bold;
        }

        .image-box{
            margin-top:25px;
            text-align:center;
        }

        .image-box img{
            width:100%;
            max-width:250px;
            border-radius:15px;
            box-shadow:0 4px 10px rgba(0,0,0,0.2);
        }

        .table-section{
            margin-top:30px;
            overflow-x:auto;
        }

        table{
            width:100%;
            border-collapse:collapse;
            border-radius:12px;
            overflow:hidden;
        }

        thead{
            background:#2563eb;
            color:white;
        }

        th, td{
            padding:14px;
            text-align:left;
            border-bottom:1px solid #e2e8f0;
        }

        tbody tr:hover{
            background:#eff6ff;
        }

        iframe{
            width:100%;
            height:180px;
            border:none;
            border-radius:12px;
            margin-top:20px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
        }

        .success-message{
            display:none;
            margin-top:20px;
            padding:12px;
            border-radius:10px;
            background:#dcfce7;
            color:#166534;
            text-align:center;
            font-weight:bold;
        }

        @media(max-width:768px){

            .form-grid{
                grid-template-columns:1fr;
            }

        }

    </style>
</head>

<body>

<div class="container">

    <h1>User Registration Form</h1>

    <form id="registrationForm">

        <div class="form-grid">

            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter username">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password">
            </div>

            <div class="form-group full-width">
                <label>Education</label>

                <div class="option-group">
                    <label><input type="checkbox"> 10th</label>
                    <label><input type="checkbox"> 12th</label>
                    <label><input type="checkbox"> Graduation</label>
                </div>
            </div>

            <div class="form-group full-width">
                <label>Languages</label>

                <div class="option-group">
                    <label><input type="checkbox"> English</label>
                    <label><input type="checkbox"> Hindi</label>
                    <label><input type="checkbox"> Marathi</label>
                </div>
            </div>

            <div class="form-group">
                <label>Gender</label>

                <div class="option-group">
                    <label><input type="radio" name="gender"> Male</label>
                    <label><input type="radio" name="gender"> Female</label>
                </div>
            </div>

            <div class="form-group">
                <label>Nationality</label>

                <div class="option-group">
                    <label><input type="radio" name="nationality"> India</label>
                    <label><input type="radio" name="nationality"> NRI</label>
                </div>
            </div>

            <div class="form-group full-width">
                <label>Country</label>

                <select id="country">
                    <option value="">Select Country</option>
                    <option value="IND">India</option>
                    <option value="USA">United States of America</option>
                    <option value="PAK">Pakistan</option>
                    <option value="SRL">Sri Lanka</option>
                    <option value="AUS">Australia</option>
                </select>
            </div>

            <div class="full-width">
                <button type="submit">Submit Form</button>
            </div>

        </div>

    </form>

    <div class="success-message" id="successMessage">
        Form Submitted Successfully ✅
    </div>

    <div class="link-section">
        <a href="https://www.google.com/dashboard" target="_blank">
            Open Google Dashboard
        </a>
    </div>

    <div class="image-box">
        <img src="images/img1.jpeg" alt="Sample Image">
    </div>

    <iframe src="test2.html" id="myframe"></iframe>

    <div class="table-section">

        <table>

            <thead>
                <tr>
                    <th>Name</th>
                    <th>Country</th>
                    <th>Occupation</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>John</td>
                    <td>UK</td>
                    <td>Engineer</td>
                </tr>

                <tr>
                    <td>Emma</td>
                    <td>USA</td>
                    <td>Doctor</td>
                </tr>

                <tr>
                    <td>Raj</td>
                    <td>India</td>
                    <td>Developer</td>
                </tr>

                <tr>
                    <td>Lisa</td>
                    <td>Australia</td>
                    <td>Designer</td>
                </tr>

            </tbody>

        </table>

    </div>

</div>

<script>

    const form = document.getElementById("registrationForm");

    form.addEventListener("submit", function(event){

        event.preventDefault();

        let username = document.getElementById("username").value;
        let password = document.getElementById("password").value;
        let country = document.getElementById("country").value;

        if(username === "" || password === "" || country === ""){
            alert("Please fill all mandatory fields");
            return;
        }

        document.getElementById("successMessage").style.display = "block";

        setTimeout(() => {
            document.getElementById("successMessage").style.display = "none";
        },3000);

        form.reset();

    });

</script>

</body>
</html>
